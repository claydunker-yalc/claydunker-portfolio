# Auto-deploys sites/beauty-nook/ to Cloudflare Pages whenever that folder
# changes on the main branch. Uses the CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID
# repo secrets. Keeps deploys automatic without needing CF's dashboard Git
# integration (which isn't available on direct-upload Pages projects).

name: Deploy Beauty Nook to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - "sites/beauty-nook/**"
      - ".github/workflows/deploy-beauty-nook.yml"
  workflow_dispatch: # lets us trigger a deploy manually from the Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy sites/beauty-nook --project-name=beauty-nook --branch=production
